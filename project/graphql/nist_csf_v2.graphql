# metamodel_version: 1.7.0
# version: 2.0.0
enum CSFElementClassValue
  {
    function
    category
    subcategory
  }

scalar Address
    addr-lines: [String]
    city: String
    state: String
    postal-code: String

scalar BackMatter
    resources: [Resource]

scalar CSFCatalogBody
    uuid: String
    metadata: CSFMetadata
    groups: [CSFFunction]
    back-matter: BackMatter

type CSFCategory
  {
    id: String
    class: CSFElementClassValue
    title: String
    props: [CSFProperty]
    parts: [CSFPart]
    controls: [CSFSubcategory]
  }

scalar CSFDocument
    catalog: CSFCatalogBody

interface CSFElement
  {
    id: String
    class: CSFElementClassValue
    title: String
    props: [CSFProperty]
    parts: [CSFPart]
  }

type CSFFunction
  {
    id: String
    class: CSFElementClassValue
    title: String
    props: [CSFProperty]
    parts: [CSFPart]
    controls: [CSFCategory]
  }

scalar CSFMetadata
    title: String
    published: String
    last-modified: String
    version: String
    oscal-version: String
    props: [CSFProperty]
    links: [Link]
    roles: [Role]
    parties: [Party]
    responsible-parties: [ResponsibleParty]

scalar CSFPart
    id: String
    name: String
    ns: String
    prose: String

type CSFProperty
  {
    name: String
    value: String
    ns: String
    remarks: String
  }

type CSFSubcategory
  {
    id: String
    class: CSFElementClassValue
    title: String
    props: [CSFProperty]
    parts: [CSFPart]
  }

type Link
  {
    href: String
    rel: String
  }

scalar Party
    uuid: String
    type: String
    name: String
    short-name: String
    email-addresses: [String]
    addresses: [Address]

scalar Resource
    uuid: String
    title: String
    rlinks: [ResourceLink]

scalar ResourceLink
    href: String
    media-type: String

scalar ResponsibleParty
    role-id: String
    party-uuids: [String]

type Role
  {
    id: String
    title: String
  }
